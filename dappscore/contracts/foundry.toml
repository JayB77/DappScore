[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[profile.default.fuzz]
runs = 256

# TESTNET ONLY — do NOT deploy to mainnet until explicitly approved.
# Active target: base_sepolia (Base Sepolia testnet)
[rpc_endpoints]
# base = "https://mainnet.base.org"  # Disabled — testnet phase only
base_sepolia = "https://sepolia.base.org"

[etherscan]
# base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }  # Disabled
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
