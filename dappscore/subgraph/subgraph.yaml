specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # ScoreToken
  - kind: ethereum
    name: ScoreToken
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # Update after deployment
      abi: ScoreToken
      startBlock: 0 # Update to deployment block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - TokenBurn
      abis:
        - name: ScoreToken
          file: ./abis/ScoreToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: TokensBurned(indexed address,uint256)
          handler: handleTokensBurned
        - event: ProtocolBurn(uint256,string)
          handler: handleProtocolBurn
      file: ./src/score-token.ts

  # ProjectRegistry
  - kind: ethereum
    name: ProjectRegistry
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # Update after deployment
      abi: ProjectRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Project
        - ProjectSubmission
      abis:
        - name: ProjectRegistry
          file: ./abis/ProjectRegistry.json
      eventHandlers:
        - event: ProjectSubmitted(indexed uint256,indexed address,string)
          handler: handleProjectSubmitted
        - event: ProjectUpdated(indexed uint256)
          handler: handleProjectUpdated
        - event: ProjectStatusChanged(indexed uint256,uint8)
          handler: handleProjectStatusChanged
        - event: ProjectTrustLevelChanged(indexed uint256,uint8)
          handler: handleTrustLevelChanged
        - event: ProjectVerified(indexed uint256)
          handler: handleProjectVerified
      file: ./src/project-registry.ts

  # VotingEngine
  - kind: ethereum
    name: VotingEngine
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # Update after deployment
      abi: VotingEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vote
        - User
        - ProjectVotes
      abis:
        - name: VotingEngine
          file: ./abis/VotingEngine.json
      eventHandlers:
        - event: Voted(indexed uint256,indexed address,uint8)
          handler: handleVoted
        - event: VoteChanged(indexed uint256,indexed address,uint8)
          handler: handleVoteChanged
        - event: RewardsClaimed(indexed address,uint256)
          handler: handleRewardsClaimed
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
        - event: ProjectFlagged(indexed uint256)
          handler: handleProjectFlagged
        - event: ProjectMarkedScam(indexed uint256)
          handler: handleProjectMarkedScam
      file: ./src/voting-engine.ts

  # PredictionMarket
  - kind: ethereum
    name: PredictionMarket
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: PredictionMarket
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Bet
      abis:
        - name: PredictionMarket
          file: ./abis/PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,indexed uint256,uint256,address)
          handler: handleMarketCreated
        - event: BetPlaced(indexed uint256,indexed address,uint256,bool)
          handler: handleBetPlaced
        - event: MarketResolved(indexed uint256,uint8,uint256,uint256)
          handler: handleMarketResolved
        - event: WinningsClaimed(indexed uint256,indexed address,uint256)
          handler: handleWinningsClaimed
      file: ./src/prediction-market.ts

  # BountySystem
  - kind: ethereum
    name: BountySystem
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: BountySystem
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Bounty
        - BountySubmission
        - Investigator
      abis:
        - name: BountySystem
          file: ./abis/BountySystem.json
      eventHandlers:
        - event: BountyCreated(indexed uint256,indexed uint256,address,uint256,uint256)
          handler: handleBountyCreated
        - event: BountyFunded(indexed uint256,address,uint256)
          handler: handleBountyFunded
        - event: SubmissionAdded(indexed uint256,uint256,address)
          handler: handleSubmissionAdded
        - event: SubmissionApproved(indexed uint256,uint256,uint256)
          handler: handleSubmissionApproved
        - event: BountyCompleted(indexed uint256)
          handler: handleBountyCompleted
      file: ./src/bounty-system.ts

  # InsurancePool
  - kind: ethereum
    name: InsurancePool
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: InsurancePool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - InsuranceStaker
        - Coverage
        - InsuranceClaim
      abis:
        - name: InsurancePool
          file: ./abis/InsurancePool.json
      eventHandlers:
        - event: Staked(indexed address,uint256)
          handler: handleInsuranceStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleInsuranceUnstaked
        - event: CoveragePurchased(indexed uint256,uint256,address,uint256)
          handler: handleCoveragePurchased
        - event: ClaimSubmitted(indexed uint256,uint256,address,uint256)
          handler: handleClaimSubmitted
        - event: ClaimApproved(indexed uint256,uint256)
          handler: handleClaimApproved
        - event: ClaimPaid(indexed uint256,address,uint256)
          handler: handleClaimPaid
      file: ./src/insurance-pool.ts

  # ReputationSystem
  - kind: ethereum
    name: ReputationSystem
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ReputationSystem
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - UserReputation
      abis:
        - name: ReputationSystem
          file: ./abis/ReputationSystem.json
      eventHandlers:
        - event: ReputationUpdated(indexed address,uint256,string)
          handler: handleReputationUpdated
        - event: ScamIdentified(indexed address,uint256)
          handler: handleScamIdentified
        - event: DecayApplied(indexed address,uint256)
          handler: handleDecayApplied
        - event: UserRegistered(indexed address)
          handler: handleUserRegistered
      file: ./src/reputation-system.ts

  # AffiliateProgram
  - kind: ethereum
    name: AffiliateProgram
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: AffiliateProgram
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Affiliate
        - Referral
      abis:
        - name: AffiliateProgram
          file: ./abis/AffiliateProgram.json
      eventHandlers:
        - event: AffiliateRegistered(indexed address,bytes32)
          handler: handleAffiliateRegistered
        - event: ReferralRecorded(indexed address,indexed address,bool,uint256)
          handler: handleReferralRecorded
        - event: EarningsWithdrawn(indexed address,uint256)
          handler: handleEarningsWithdrawn
        - event: LevelUpgraded(indexed address,uint8)
          handler: handleLevelUpgraded
      file: ./src/affiliate-program.ts

  # PremiumListings
  - kind: ethereum
    name: PremiumListings
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # Update after deployment
      abi: PremiumListings
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Project
      abis:
        - name: PremiumListings
          file: ./abis/PremiumListings.json
      eventHandlers:
        - event: PremiumPurchased(indexed uint256,indexed address,uint256,uint256)
          handler: handlePremiumPurchased
      file: ./src/premium-listings.ts
