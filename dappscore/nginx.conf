# nginx site config for app.dappscore.io
# Place at: /etc/nginx/sites-available/dappscore
# Enable: ln -s /etc/nginx/sites-available/dappscore /etc/nginx/sites-enabled/dappscore
# Test:   nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app.dappscore.io;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.dappscore.io;

    # ── TLS (certbot will fill these in) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.dappscore.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.dappscore.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Root: Next.js static export ──────────────────────────────────────────
    root /var/www/dappscore/out;
    index index.html;

    # ── Static assets: long-lived cache, no rewrite needed ───────────────────
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── API: proxy to Express backend on port 3001 ───────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── SPA routing: mirror firebase.json rewrites ───────────────────────────
    location ~ ^/projects/[^/]+/analysis(/?)$ {
        try_files $uri /projects/index/analysis/index.html;
    }

    location ~ ^/projects/[^/]+/edit(/?)$ {
        try_files $uri /projects/index/edit/index.html;
    }

    location ~ ^/projects/[^/]+(/?)$ {
        try_files $uri /projects/index/index.html;
    }

    # ── All other routes: SPA fallback ───────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dappscore.access.log;
    error_log  /var/log/nginx/dappscore.error.log;
}
