<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DappScore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #F8FAFC;
    }

    .header {
      background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
      padding: 16px;
      border-bottom: 1px solid #334155;
    }

    .header h1 {
      font-size: 20px;
      color: #FACC15;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 img {
      width: 24px;
      height: 24px;
    }

    .search-box {
      padding: 16px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1E293B;
      color: #F8FAFC;
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: #FACC15;
    }

    .search-input::placeholder {
      color: #64748B;
    }

    .content {
      padding: 0 16px 16px;
    }

    .result-card {
      background: #1E293B;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .project-name {
      font-size: 18px;
      font-weight: 600;
    }

    .project-symbol {
      color: #94A3B8;
      font-size: 14px;
    }

    .trust-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .trust-badge.trusted { background: #10B981; }
    .trust-badge.neutral { background: #F59E0B; }
    .trust-badge.suspicious { background: #F97316; }
    .trust-badge.scam { background: #EF4444; }
    .trust-badge.new { background: #6B7280; }

    .trust-score {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }

    .score-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border: 3px solid;
    }

    .score-circle.high { border-color: #10B981; color: #10B981; }
    .score-circle.medium { border-color: #F59E0B; color: #F59E0B; }
    .score-circle.low { border-color: #EF4444; color: #EF4444; }

    .score-details {
      flex: 1;
    }

    .vote-bar {
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .vote-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #10B981 var(--up), #EF4444 var(--up));
    }

    .vote-counts {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #94A3B8;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-primary {
      background: #FACC15;
      color: #0F172A;
    }

    .btn-secondary {
      background: #334155;
      color: #F8FAFC;
    }

    .warning-banner {
      background: linear-gradient(90deg, #7F1D1D, #991B1B);
      padding: 12px 16px;
      margin: 0 16px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .warning-banner .icon {
      font-size: 24px;
    }

    .warning-banner .text {
      font-size: 13px;
      line-height: 1.4;
    }

    .recent-checks {
      padding: 16px;
      border-top: 1px solid #334155;
    }

    .recent-checks h3 {
      font-size: 14px;
      color: #94A3B8;
      margin-bottom: 12px;
    }

    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1E293B;
      cursor: pointer;
    }

    .recent-item:hover {
      background: #1E293B;
      margin: 0 -8px;
      padding: 8px;
      border-radius: 4px;
    }

    .recent-item .name {
      font-size: 14px;
    }

    .recent-item .score {
      font-size: 14px;
      font-weight: 500;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #64748B;
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #334155;
      border-top-color: #FACC15;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748B;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #334155;
      text-align: center;
    }

    .footer a {
      color: #FACC15;
      text-decoration: none;
      font-size: 13px;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <span>🛡️</span>
      DappScore
    </h1>
  </div>

  <div class="search-box">
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="Search project or paste contract address..."
    />
  </div>

  <div id="content" class="content">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Enter a project name or contract address to check its trust score</p>
    </div>
  </div>

  <div class="recent-checks" id="recentChecks">
    <h3>Recent Checks</h3>
    <div id="recentList"></div>
  </div>

  <div class="footer">
    <a href="https://dappscore.io" target="_blank">Open DappScore Website →</a>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
