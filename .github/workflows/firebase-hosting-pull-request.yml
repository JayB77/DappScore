# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './dappscore/package-lock.json'

      - name: Install dependencies
        working-directory: ./dappscore
        run: npm ci

      - name: Build
        working-directory: ./dappscore
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Preview to Firebase
        working-directory: ./dappscore
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAPPSCORE_IO }}' > sa.json
          npx firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} --expires 7d --project dappscore-io
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa.json
